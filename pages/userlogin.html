<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Room For U</title>
    <script src="https://kit.fontawesome.com/61d1b80f50.js" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #4254b3, #8b44ad);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 30px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .logo h1 {
            color: #4254b3;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .logo p {
            color: #666;
            font-size: 16px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            border-color: #4254b3;
            outline: none;
        }
        
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
        }
        
        .checkbox-group input {
            margin-right: 5px;
        }
        
        .forgot-password {
            color: #4254b3;
            text-decoration: none;
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #4254b3;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-login:hover {
            background-color: #3245a2;
        }
        
        .register-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        
        .register-link {
            color: #4254b3;
            text-decoration: none;
            font-weight: 600;
        }
        
        .register-link:hover {
            text-decoration: underline;
        }
        
        .social-login {
            margin-top: 25px;
            text-align: center;
        }
        
        .social-login p {
            position: relative;
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
        }
        
        .social-login p::before,
        .social-login p::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background-color: #ddd;
        }
        
        .social-login p::before {
            left: 0;
        }
        
        .social-login p::after {
            right: 0;
        }
        
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #f5f5f5;
            color: #333;
            font-size: 20px;
            transition: all 0.3s;
        }
        
        .social-icon:hover {
            transform: translateY(-3px);
        }
        
        .social-icon.facebook {
            color: #3b5998;
        }
        
        .social-icon.google {
            color: #db4437;
        }
        
        .social-icon.twitter {
            color: #1da1f2;
        }
        
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .back-link {
            color: #4254b3;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <h1>Room For U</h1>
            <p>User Login</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            
            <div class="input-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" required>
            </div>
            
            <div class="remember-forgot">
                <div class="checkbox-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn-login">Login</button>
            
            <p class="register-text">
                Don't have an account? <a href="#" class="register-link">Register</a>
            </p>
        </form>
        
        <div class="social-login">
            <p>Or login with</p>
            <div class="social-icons">
                <a href="#" class="social-icon facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-icon google"><i class="fab fa-google"></i></a>
                <a href="#" class="social-icon twitter"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
        
        <a href="../index.html" class="back-link">Back to Home</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Check if user is already logged in
            const currentUser = JSON.parse(localStorage.getItem('roomForUCurrentUser') || '{}');
            if (currentUser && currentUser.name) {
                // Hide login form and show welcome message
                document.querySelector('.login-container').innerHTML = `
                    <div class="logo">
                        <h1>Room For U</h1>
                        <p>Welcome Back!</p>
                    </div>
                    <div style="text-align: center; padding: 20px;">
                        <h2 style="color: #4254b3; margin-bottom: 15px;">Hello, ${currentUser.name}!</h2>
                        <p style="margin-bottom: 25px;">You are already logged in. What would you like to do?</p>
                        <button id="continueBrowsingBtn" class="btn-login" style="margin-bottom: 15px;">Continue Browsing</button>
                        <button id="logoutBtn" class="btn-login" style="background-color: #f44336;">Logout</button>
                    </div>
                    <a href="../index.html" class="back-link">Back to Home</a>
                `;
                
                // Add event listeners for the buttons
                document.getElementById('continueBrowsingBtn').addEventListener('click', function() {
                    window.location.href = '../index.html';
                });
                
                document.getElementById('logoutBtn').addEventListener('click', function() {
                    localStorage.removeItem('roomForUCurrentUser');
                    window.location.reload();
                });
                
                return; // Exit early
            }
            
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // Get form values
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const address = document.getElementById('address').value.trim();
                
                // Simple validation
                if (!name || !email || !phone || !address) {
                    showError('Please fill in all fields');
                    return;
                }
                
                if (phone.length < 10) {
                    showError('Please enter a valid phone number');
                    return;
                }
                
                if (!isValidEmail(email)) {
                    showError('Please enter a valid email address');
                    return;
                }
                
                // Create user object
                const userData = {
                    name: name,
                    email: email,
                    phone: phone,
                    address: address,
                    timestamp: new Date().toISOString()
                };
                
                // Save current user to localStorage
                localStorage.setItem('roomForUCurrentUser', JSON.stringify(userData));
                
                // Get existing users or create new array
                let users = JSON.parse(localStorage.getItem('roomForUUsers') || '[]');
                
                // Add current user to users array
                users.push(userData);
                
                // Save updated users array
                localStorage.setItem('roomForUUsers', JSON.stringify(users));
                
                // Show success message
                showSuccess('Login successful! Redirecting...');
                
                // Redirect to home page instead of view_data
                setTimeout(function() {
                    // Create a popup overlay before redirecting
                    const overlay = document.createElement('div');
                    overlay.style.position = 'fixed';
                    overlay.style.top = '0';
                    overlay.style.left = '0';
                    overlay.style.width = '100%';
                    overlay.style.height = '100%';
                    overlay.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
                    overlay.style.display = 'flex';
                    overlay.style.justifyContent = 'center';
                    overlay.style.alignItems = 'center';
                    overlay.style.zIndex = '1000';
                    
                    const popup = document.createElement('div');
                    popup.style.backgroundColor = 'white';
                    popup.style.padding = '30px';
                    popup.style.borderRadius = '10px';
                    popup.style.maxWidth = '400px';
                    popup.style.textAlign = 'center';
                    popup.style.boxShadow = '0 5px 15px rgba(0, 0, 0, 0.3)';
                    
                    const title = document.createElement('h2');
                    title.textContent = 'Welcome to Room For U!';
                    title.style.color = '#4254b3';
                    title.style.marginBottom = '15px';
                    
                    const message = document.createElement('p');
                    message.textContent = `Thank you for logging in, ${name}! We're excited to help you find your perfect accommodation.`;
                    message.style.marginBottom = '20px';
                    message.style.lineHeight = '1.5';
                    
                    const button = document.createElement('button');
                    button.textContent = 'Continue to Website';
                    button.style.padding = '10px 20px';
                    button.style.backgroundColor = '#4254b3';
                    button.style.color = 'white';
                    button.style.border = 'none';
                    button.style.borderRadius = '5px';
                    button.style.cursor = 'pointer';
                    button.style.fontWeight = 'bold';
                    
                    button.addEventListener('click', function() {
                        window.location.href = '../index.html';
                    });
                    
                    popup.appendChild(title);
                    popup.appendChild(message);
                    popup.appendChild(button);
                    overlay.appendChild(popup);
                    document.body.appendChild(overlay);
                    
                    // Set a timeout to automatically redirect after 5 seconds if user doesn't click the button
                    setTimeout(function() {
                        window.location.href = '../index.html';
                    }, 5000);
                }, 1500);
            });
            
            // Helper functions
            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                
                // Hide error after 3 seconds
                setTimeout(function() {
                    errorMessage.style.display = 'none';
                }, 3000);
            }
            
            function showSuccess(message) {
                successMessage.textContent = message;
                successMessage.style.display = 'block';
                errorMessage.style.display = 'none';
            }
            
            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }
        });
    </script>
</body>

</html>
